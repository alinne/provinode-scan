name: ci

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  ios-build-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: workbench/apps/provinode-scan
    steps:
      - name: Check out Provinode Scan
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: workbench/apps/provinode-scan
      - name: Check out Linnaeus engine client SDK
        uses: actions/checkout@v4
        with:
          repository: alinne/linnaeus-engine
          ssh-key: ${{ secrets.LINNAEUS_ENGINE_DEPLOY_KEY }}
          path: workbench/linnaeus/linnaeus-engine
      - name: Check out Provinode Room contracts
        uses: actions/checkout@v4
        with:
          repository: alinne/provinode-room-contracts
          ssh-key: ${{ secrets.PROVINODE_ROOM_CONTRACTS_DEPLOY_KEY }}
          path: workbench/apps/provinode-room-contracts
      - name: Verify internal API architecture
        shell: pwsh
        run: |
          $baseRef = if ("${{ github.event_name }}" -eq "pull_request" -and "${{ github.base_ref }}" -ne "") { "origin/${{ github.base_ref }}" } else { "HEAD~1" }
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ops/Assert-InternalApiArchitecture.ps1 -BaseRef $baseRef -Strict
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        run: ./scripts/bootstrap.sh
      - name: Build
        run: |
          xcodebuild \
            -project ProvinodeScan.xcodeproj \
            -scheme ProvinodeScan \
            -destination 'generic/platform=iOS Simulator' \
            build
      - name: Test
        run: ./scripts/test.sh
