name: ProvinodeScan
options:
  minimumXcodeGenVersion: 2.38.0
  xcodeVersion: "15.4"
  projectFormat: xcode15_3
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.provinode.scan
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
packages:
  LinnaeusEngineClientSdkApple:
    path: ../../linnaeus/linnaeus-engine/src/Linnaeus.Engine.ClientSdk.Apple
  ProvinodeRoomContracts:
    path: ../provinode-room-contracts/swift/ProvinodeRoomContracts
targets:
  ProvinodeScan:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Config/Info.plist
      properties:
        NSBonjourServices:
          - _provinode-room._tcp
        NSCameraUsageDescription: Provinode Scan uses the camera and LiDAR sensor to capture rooms and scan desktop pairing QR codes.
        NSLocalNetworkUsageDescription: Provinode Scan discovers nearby Provinode Room receivers on your local network.
    settings:
      base:
        PRODUCT_NAME: ProvinodeScan
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    dependencies:
      - package: LinnaeusEngineClientSdkApple
      - package: ProvinodeRoomContracts
  ProvinodeScanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/ProvinodeScanTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: LinnaeusEngineClientSdkApple
      - target: ProvinodeScan
      - package: ProvinodeRoomContracts
schemes:
  ProvinodeScan:
    build:
      targets:
        ProvinodeScan: all
    test:
      targets:
        - ProvinodeScanTests
